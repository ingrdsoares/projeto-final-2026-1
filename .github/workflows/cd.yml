name: CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # permissions:
    #   contents: read
    #   packages: write # Necessário para GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          # registry: ghcr.io # Descomente e use se for usar GitHub Container Registry

      - name: Build and push API Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src/infrastructure
          # Assumindo que o Dockerfile da API se chama Dockerfile.api
          # Se for apenas Dockerfile, ajuste o parâmetro 'file'.
          file: ./src/infrastructure/Dockerfile.api 
          push: true
          tags: YOUR_DOCKERHUB_USERNAME/purple-team-api:latest # Substitua YOUR_DOCKERHUB_USERNAME

      - name: Build and push Dashboard Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src/infrastructure
          # Assumindo que o Dockerfile do dashboard se chama Dockerfile.dashboard
          # Se for apenas Dockerfile, ajuste o parâmetro 'file'.
          file: ./src/infrastructure/Dockerfile.dashboard
          push: true
          tags: YOUR_DOCKERHUB_USERNAME/purple-team-dashboard:latest # Substitua YOUR_DOCKERHUB_USERNAME

  # Etapa de deploy (placeholder)
  # Esta seção precisaria ser configurada com base na plataforma de deploy (Railway, Cloud Run, etc.)
