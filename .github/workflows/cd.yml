name: CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Necessário para GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # Usuário do GitHub que disparou o workflow
          password: ${{ secrets.GITHUB_TOKEN }} # Token de acesso gerado automaticamente pelo GitHub Actions

      - name: Build and push API Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src/infrastructure
          file: ./src/infrastructure/Dockerfile.api # Assumindo que este Dockerfile existe
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/purple-team-api:latest # Tag para GHCR

      - name: Build and push Dashboard Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src/infrastructure
          file: ./src/infrastructure/Dockerfile.dashboard # Assumindo que este Dockerfile existe
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/purple-team-dashboard:latest # Tag para GHCR

  deploy-to-railway:
    needs: build-and-push # Depende do sucesso do build e push
    runs-on: ubuntu-latest
    # Opcional: configurar permissões se usar o action do Railway
    # permissions: {} 

    steps:
      - name: Deploy API to Railway
        uses: railway-apps/railway-deploy@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          project: ${{ secrets.RAILWAY_PROJECT_ID }}
          service: ${{ secrets.RAILWAY_API_SERVICE_ID }}
          image: ghcr.io/${{ github.repository_owner }}/purple-team-api:latest

      - name: Deploy Dashboard to Railway
        uses: railway-apps/railway-deploy@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          project: ${{ secrets.RAILWAY_PROJECT_ID }}
          service: ${{ secrets.RAILWAY_DASHBOARD_SERVICE_ID }}
          image: ghcr.io/${{ github.repository_owner }}/purple-team-dashboard:latest
