name: CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src/infrastructure
          file: ./src/infrastructure/Dockerfile.api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/purple-team-api:latest

      - name: Build and push Dashboard Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src/infrastructure
          file: ./src/infrastructure/Dockerfile.dashboard
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/purple-team-dashboard:latest
