name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Assumindo uma versão comum de Python

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r (4-S_Ingrid_Soares)/requirements.txt ruff

      - name: Run linters
        run: |
          ruff check .
          ruff format . --check

      - name: Check code integrity
        run: |
          # Define PYTHONPATH para incluir o diretório raiz do repositório
          export PYTHONPATH=$PYTHONPATH:.
          # Agora o Python deve encontrar 'src.api' e 'src.agent'
          python -c "from src.api.main import app; from src.agent.orchestrator import PurpleOrchestrator"
          echo "Code integrity check passed."

